<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BoltSearch Demo</title>
<link rel="stylesheet" href="/style.css">
<script src="/htmx.min.js"></script>
</head>
<body>

<div id="app">
  <header>
    <h1>BoltSearch</h1>
    <div id="stats">
      <span class="stat">加载中…</span>
    </div>
  </header>

  <main>
    <div id="search-box">
      <div id="search-opts">
        <label><input type="radio" name="mode" value="or" checked> OR</label>
        <label><input type="radio" name="mode" value="and"> AND</label>
        <label><input type="checkbox" id="prefix"> 前缀</label>
        <select id="limit">
          <option>5</option><option selected>10</option><option>20</option><option>50</option>
        </select>
        <button id="search-btn">搜索</button>
      </div>
      <input type="text" id="query" placeholder="输入关键词搜索…" autocomplete="off">
      <div id="suggestions"></div>
    </div>
    <div id="results">
      <div class="empty">输入关键词开始搜索</div>
    </div>
  </main>

  <aside>
    <h3>数据库</h3>
    <div id="buckets"></div>
    <div id="browse-detail"></div>
  </aside>
</div>

<div id="toast"></div>

<script>
const API = 'http://localhost:8080/api';

const DEMO = [
  {title:"小米14 Pro深度评测",content:"小米14 Pro搭载高通骁龙8 Gen 3处理器，采用台积电4nm工艺。屏幕为6.73英寸1.5K分辨率AMOLED面板，支持120Hz LTPO自适应刷新率，峰值亮度3000nit。后置三摄：5000万像素主摄、5000万像素超广角、5000万像素长焦。电池4610mAh，支持90W有线快充和50W无线快充。"},
  {title:"华为Mate 60 Pro体验",content:"华为Mate 60 Pro搭载自研麒麟9000S处理器，支持卫星通话和卫星消息。采用6.82英寸OLED四曲面屏，支持1-120Hz自适应刷新率。后置5000万像素主摄+1200万像素超广角+4800万像素长焦微距。电池4750mAh，支持88W有线快充和50W无线快充。"},
  {title:"iPhone 15 Pro Max开箱",content:"iPhone 15 Pro Max搭载A17 Pro芯片，基于台积电3nm工艺制造。采用6.7英寸Super Retina XDR OLED显示屏，支持ProMotion 120Hz自适应刷新率。后置4800万像素主摄+1200万像素超广角+1200万像素5倍长焦。首次采用USB-C接口，钛金属中框。"},
  {title:"Python编程入门指南",content:"Python is a high-level, interpreted programming language known for its readability and simple syntax. It supports multiple programming paradigms including object-oriented, imperative, and functional programming."},
  {title:"Golang并发编程实战",content:"Golang is a statically typed, compiled programming language designed at Google. Key features include goroutines for lightweight concurrency, channels for communication between goroutines, and a built-in garbage collector."},
  {title:"Rust语言入门与内存安全",content:"Rust is a systems programming language focused on safety, speed, and concurrency. Its unique ownership system prevents memory errors at compile time without needing a garbage collector."},
  {title:"骁龙8 Gen 3 vs 天玑9300 性能对比",content:"高通骁龙8 Gen 3采用1+5+2三丛集架构，Cortex-X4超大核主频3.3GHz，GPU为Adreno 750，台积电4nm工艺。安兔兔跑分约210万分。联发科天玑9300采用4个Cortex-X4超大核+4个Cortex-A720大核的激进设计，台积电4nm工艺。"},
  {title:"2024年最佳智能手机推荐",content:"年度智能手机推荐榜单：小米14 Pro以出色的徕卡影像和骁龙8 Gen 3性能位居榜首。华为Mate 60 Pro凭借卫星通信和自研麒麟芯片获得特别推荐。iPhone 15 Pro Max以A17 Pro的强大性能和优秀的视频拍摄能力占据高端市场。"},
  {title:"Redis缓存设计与性能优化",content:"Redis is an in-memory data structure store used as a database, cache, and message broker. Common data structures include strings, hashes, lists, sets, sorted sets, and streams."},
  {title:"PostgreSQL索引优化技巧",content:"PostgreSQL supports multiple index types: B-tree for equality and range queries, Hash for simple equality, GiST for geometric and full-text search, GIN for array and JSONB queries, and BRIN for large tables with natural ordering."}
];

async function seed() {
  const toast = document.getElementById('toast');
  toast.textContent = '正在导入示例数据…';
  toast.className = 'show';
  const jsonl = DEMO.map(d => JSON.stringify(d)).join('\n');
  const fd = new FormData();
  fd.append('file', new Blob([jsonl],{type:'application/jsonl'}), 'demo.jsonl');
  try {
    const r = await fetch(API + '/index', {method:'POST', body:fd});
    const d = await r.json();
    toast.textContent = '导入完成：' + d.indexed + ' 篇文档' + (d.summary||'');
  } catch(e) { toast.textContent = '请先启动 boltsearch serve'; }
  setTimeout(() => toast.className = '', 3000);
  loadStats(); loadBuckets();
}

async function loadStats() {
  try {
    const r = await fetch(API + '/stats');
    const d = await r.json();
    document.getElementById('stats').innerHTML =
      `<span class="stat"><span>文档</span> ${d.TotalDocs}</span>` +
      `<span class="stat"><span>词项</span> ${d.UniqueTerms}</span>` +
      `<span class="stat"><span>大小</span> ${(d.DBFileSize/1024).toFixed(0)}KB</span>`;
  } catch(e) {}
}

async function loadBuckets() {
  try {
    const r = await fetch(API + '/browse');
    const d = await r.json();
    document.getElementById('buckets').innerHTML = d.map(b =>
      `<div class="bucket-row" data-bucket="${b.name}">` +
      `<span class="name">${b.name}</span><span class="count">${b.count} 条</span></div>`
    ).join('');
  } catch(e) {}
}

async function doSearch() {
  const q = document.getElementById('query').value.trim();
  if (!q) return;
  const mode = document.querySelector('input[name=mode]:checked').value;
  const prefix = document.getElementById('prefix').checked;
  const limit = document.getElementById('limit').value;
  const params = new URLSearchParams({q, mode, limit});
  if (prefix) params.set('prefix', 'true');
  try {
    const r = await fetch(API + '/search?' + params);
    const d = await r.json();
    if (!d.results || d.results.length === 0) {
      document.getElementById('results').innerHTML = '<div class="empty">未找到结果</div>';
      return;
    }
    document.getElementById('results').innerHTML =
      `<div class="result-count">找到 ${d.totalHits} 条结果</div>` +
      d.results.map(r => `
        <div class="result-item">
          <div class="title">${esc(r.Doc.Title)}</div>
          <div class="meta">
            <span>DocID: ${r.Doc.ID}</span>
            <span class="score">得分: ${r.Score.toFixed(2)}</span>
            <span>匹配: ${r.MatchedOn.join(', ')}</span>
          </div>
          <div class="content">${esc(trunc(r.Doc.Content, 120))}</div>
          <div class="actions">
            <button class="delete-btn" data-id="${r.Doc.ID}">删除</button>
          </div>
        </div>`).join('');
    loadStats();
  } catch(e) { document.getElementById('results').innerHTML = '<div class="empty">连接失败</div>'; }
}

async function suggest() {
  const q = document.getElementById('query').value.trim();
  const el = document.getElementById('suggestions');
  if (!q) { el.innerHTML = ''; return; }
  try {
    const r = await fetch(API + '/suggest?prefix=' + q + '&limit=8');
    const d = await r.json();
    el.innerHTML = (!d||!d.length) ? '' : d.map(s => `<span>${esc(s)}</span>`).join('');
  } catch(e) {}
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function trunc(s,n) { return s.length > n ? s.slice(0,n) + '…' : s; }

document.getElementById('search-btn').onclick = doSearch;
document.getElementById('query').onkeydown = function(e) { if(e.key==='Enter') doSearch(); };
document.getElementById('query').oninput = suggest;

document.addEventListener('click', function(e) {
  if (e.target.closest('#suggestions span')) {
    document.getElementById('query').value = e.target.textContent;
    document.getElementById('suggestions').innerHTML = '';
    doSearch();
  }
  if (!e.target.closest('#search-box')) document.getElementById('suggestions').innerHTML = '';
  if (e.target.closest('.delete-btn')) {
    const id = e.target.closest('.delete-btn').dataset.id;
    fetch(API + '/docs/' + id, {method:'DELETE'}).then(() => { doSearch(); loadStats(); loadBuckets(); });
  }
  if (e.target.closest('.bucket-row')) {
    const name = e.target.closest('.bucket-row').dataset.bucket;
    const detail = document.getElementById('browse-detail');
    detail.innerHTML = '加载中…';
    fetch(API + '/browse?bucket=' + name + '&limit=1000')
      .then(r => r.json())
      .then(d => {
        if (!d.rows || d.rows.length === 0) {
          detail.innerHTML = `<h4>${d.bucket}</h4><div class="empty">无数据</div>`;
          return;
        }
        const headers = d.headers;
        detail.innerHTML =
          `<h4>${d.bucket} <span class="count">${d.total} 条</span></h4>` +
          `<table class="kv-table"><thead><tr>` +
          headers.map(h => `<th>${esc(h)}</th>`).join('') +
          `</tr></thead><tbody>` +
          d.rows.map(r =>
            `<tr>` + r.map((c,i) => {
              const val = String(c||'');
              const display = headers[i] === 'Content' ? trunc(val, 60) : val;
              return `<td class="kv-cell" data-full="${esc(val)}">${esc(display)}</td>`;
            }).join('') + `</tr>`
          ).join('') +
          `</tbody></table>`;
      });
  }
  if (e.target.closest('.kv-cell')) {
    const modal = document.getElementById('modal');
    document.getElementById('modal-body').textContent = e.target.closest('.kv-cell').dataset.full;
    modal.className = 'show';
  }
  if (e.target.id === 'modal') {
    document.getElementById('modal').className = '';
  }
});

document.addEventListener('DOMContentLoaded', seed);
</script>

<div id="modal"><div id="modal-body"></div></div>

</body>
</html>
